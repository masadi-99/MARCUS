### MARCUS — Stage 1: Cardiac MRI Vision Encoder Pre-training
### Trains the CMR visual encoder + temporal aggregation + metadata-driven sequence
### selection + 2-layer MLP projection. The Qwen2 LM is frozen in this stage.
### CMR input: Multi-sequence DICOM series (cine, LGE, T1/T2 mapping, perfusion).
### See: O'Sullivan et al., 2026 — MARCUS preprint.

### ── Model ──────────────────────────────────────────────────────────────────
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct

# Stage 1: freeze LLM, train CMR vision encoder + metadata-driven sequence selector
freeze_vision_tower: false    # Train the CMR visual encoder
freeze_language_model: true   # Keep Qwen2 LM frozen
visual_inputs: true

### ── Data ───────────────────────────────────────────────────────────────────
# CMR data: multi-sequence DICOM studies.
# Sequences handled: cine (SAX/LAX), LGE, T1 mapping, T2 mapping, perfusion.
# The metadata-driven sequence selector picks the most relevant sequences per question.
# Each example: {"messages": [{"role": "user", "content": [cmr_frames, question]},
#                              {"role": "assistant", "content": report_text}]}
dataset: cmr_grid_vqa_train
dataset_dir: data/
template: qwen2_vl
cutoff_len: 1024              # Max token length for CMR report text

### ── Training ───────────────────────────────────────────────────────────────
stage: sft
do_train: true
finetuning_type: full         # Full parameter fine-tuning for vision encoder

# Lower LR: CMR encoder needs to learn across multiple sequence types
learning_rate: 1.0e-4
num_train_epochs: 3
# Small batch: CMR multi-sequence studies are the largest input type
per_device_train_batch_size: 2
gradient_accumulation_steps: 8   # Effective batch = 2 * 8 * n_gpus

lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.0
fp16: false
bf16: true
tf32: true

# Gradient clipping
max_grad_norm: 1.0

### ── Output ─────────────────────────────────────────────────────────────────
output_dir: saves/Qwen2.5-VL-3B-Instruct/full/cmr_pretrain
logging_steps: 50
save_steps: 500
save_total_limit: 2

### ── Hardware (DGX H100 — 8 GPUs, longest stage at ~72h) ───────────────────
ddp_find_unused_parameters: false
# Launch with: torchrun --nproc_per_node=8 $(which llamafactory-cli) train ...
