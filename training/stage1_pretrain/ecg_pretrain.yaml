### MARCUS — Stage 1: ECG Vision Encoder Pre-training
### Trains the SigLIP vision encoder + 2-layer MLP projection on 249,785 ECGs.
### The language model (Qwen2) weights are frozen during this stage.
### See: O'Sullivan et al., 2026 — MARCUS preprint.

### ── Model ──────────────────────────────────────────────────────────────────
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct

# Stage 1: freeze LLM, train vision encoder + MLP projection
freeze_vision_tower: false    # Train the SigLIP vision encoder
freeze_language_model: true   # Keep Qwen2 LM frozen
visual_inputs: true

### ── Data ───────────────────────────────────────────────────────────────────
# ECG images: 12-lead waveforms rendered as 4x3 grid PNGs.
# Each example: {"messages": [{"role": "user", "content": [image, question]}, {"role": "assistant", "content": report_text}]}
dataset: ecg_vqa_train
dataset_dir: data/
template: qwen2_vl            # LLaMA-Factory template for Qwen2-VL
cutoff_len: 1024              # Max token length for report text

### ── Training ───────────────────────────────────────────────────────────────
stage: sft
do_train: true
finetuning_type: full         # Full parameter fine-tuning for vision encoder

learning_rate: 2.0e-4         # Higher LR: only vision encoder params being trained
num_train_epochs: 3
per_device_train_batch_size: 8
gradient_accumulation_steps: 4  # Effective batch = 8 * 4 * n_gpus

lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.0
fp16: false
bf16: true
tf32: true

# Gradient clipping
max_grad_norm: 1.0

### ── Output ─────────────────────────────────────────────────────────────────
output_dir: saves/Qwen2.5-VL-3B-Instruct/full/ecg_pretrain
logging_steps: 50
save_steps: 1000
save_total_limit: 2

### ── Hardware (DGX H100) ────────────────────────────────────────────────────
ddp_find_unused_parameters: false
