### MARCUS — Stage 1: Echocardiogram Vision Encoder Pre-training
### Trains the multi-view visual encoder + temporal aggregation + 2-layer MLP projection.
### The language model (Qwen2) weights are frozen during this stage.
### Echo input: DICOM-derived multi-view video clips (PLAX, PSAX, A4C, A2C, subcostal).
### See: O'Sullivan et al., 2026 — MARCUS preprint.

### ── Model ──────────────────────────────────────────────────────────────────
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct

# Stage 1: freeze LLM, train vision encoder + temporal aggregation + MLP projection
freeze_vision_tower: false    # Train the multi-view visual encoder
freeze_language_model: true   # Keep Qwen2 LM frozen
visual_inputs: true

### ── Data ───────────────────────────────────────────────────────────────────
# Echo video clips: multi-view 2D DICOM studies, up to 5 views per study.
# Each example: {"messages": [{"role": "user", "content": [video_frames, question]},
#                              {"role": "assistant", "content": report_text}]}
# Video frames are extracted at 25 fps, max 64 frames per view, 5 views per study.
dataset: echo_grid_vqa_train
dataset_dir: data/
template: qwen2_vl            # LLaMA-Factory template for Qwen2-VL
cutoff_len: 1024              # Max token length for echo report text

### ── Training ───────────────────────────────────────────────────────────────
stage: sft
do_train: true
finetuning_type: full         # Full parameter fine-tuning for vision encoder

# Lower LR than ECG: multi-view temporal model is more complex
learning_rate: 1.0e-4
num_train_epochs: 3
# Smaller per-device batch: echo video clips are significantly larger than ECG images
per_device_train_batch_size: 2
gradient_accumulation_steps: 8   # Effective batch = 2 * 8 * n_gpus

lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.0
fp16: false
bf16: true
tf32: true

# Gradient clipping
max_grad_norm: 1.0

### ── Output ─────────────────────────────────────────────────────────────────
output_dir: saves/Qwen2.5-VL-3B-Instruct/full/echo_pretrain
logging_steps: 50
save_steps: 500
save_total_limit: 2

### ── Hardware (DGX H100 — 8 GPUs required for echo video) ──────────────────
ddp_find_unused_parameters: false
# Launch with: torchrun --nproc_per_node=8 $(which llamafactory-cli) train ...
